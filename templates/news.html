<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>All news — FinanceTracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/darkly/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/index.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/privacy-mode.css') }}">
  </head>
  <body>
    <div class="container-fluid py-4">
      <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
        <div>
          <h1 class="h4 mb-1">All news</h1>
          <p class="text-secondary mb-0">RSS headlines by day. Ticker tags when a symbol matches Manage Stocks or Plaid-linked holdings.</p>
        </div>
        <a class="btn btn-outline-light btn-sm" href="/">
          <i class="bi bi-house me-1"></i>Back home
        </a>
      </div>

      <div class="neon-panel neon-purple">
        <div class="neon-body">
          <div class="d-flex flex-wrap align-items-start justify-content-between gap-2 mb-2">
            <div>
              <h2 class="h5 mb-1">Headlines</h2>
              <p class="text-secondary mb-0 small">Digest refreshes once per day automatically; use Refresh to fetch now.</p>
            </div>
            <div class="d-flex align-items-center gap-2">
              <span class="badge bg-secondary-subtle text-secondary-emphasis" id="newsDigestMeta">Loading…</span>
              <button type="button" class="btn btn-outline-light btn-sm" id="newsDigestRefreshBtn" title="Fetch latest headlines now">
                <i class="bi bi-arrow-clockwise me-1"></i>Refresh
              </button>
            </div>
          </div>
          <div class="table-responsive news-digest-table-wrap">
            <table class="table table-dark table-sm align-middle mb-0 news-digest-table">
              <thead>
                <tr>
                  <th scope="col" class="news-digest-col-headline">Headline</th>
                  <th scope="col" class="text-secondary news-digest-col-outlet">Outlet</th>
                  <th scope="col" class="news-digest-col-type">Type</th>
                  <th scope="col" class="news-digest-col-tickers">Tickers</th>
                </tr>
              </thead>
              <tbody id="newsDigestTableBody" class="small">
                <tr><td colspan="4" class="text-secondary">Loading…</td></tr>
              </tbody>
            </table>
          </div>
          <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mt-2 px-1 news-digest-day-nav">
            <button type="button" class="btn btn-outline-light btn-sm" id="newsDigestDayNewer" disabled title="Newer day (toward today)">← Newer</button>
            <span id="newsDigestDayLabel" class="text-secondary small">—</span>
            <button type="button" class="btn btn-outline-light btn-sm" id="newsDigestDayOlder" disabled title="Older day">Older →</button>
          </div>
        </div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/client-error.js') }}"></script>
    <script>
    (function () {
      const tbodyEl = document.getElementById("newsDigestTableBody");
      const metaEl = document.getElementById("newsDigestMeta");
      const refreshBtn = document.getElementById("newsDigestRefreshBtn");
      const dayLabelEl = document.getElementById("newsDigestDayLabel");
      const dayNewerBtn = document.getElementById("newsDigestDayNewer");
      const dayOlderBtn = document.getElementById("newsDigestDayOlder");
      if (!tbodyEl || !metaEl || !refreshBtn || !dayLabelEl || !dayNewerBtn || !dayOlderBtn) return;

      var lastDayPayload = null;

      function escapeHtml(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      function formatTypeLabels(categories) {
        if (!categories || !categories.length) {
          return "—";
        }
        return categories.map(function (c) {
          const x = String(c || "").trim();
          if (!x) return "";
          return x.charAt(0).toUpperCase() + x.slice(1);
        }).filter(Boolean).join(", ");
      }

      function renderDigest(data) {
        lastDayPayload = data || null;
        const items = (data && data.items) || [];
        const when = (data && data.digest_generated_at_utc) || (data && data.generated_at_utc);
        const tz = (data && data.schedule_tz) || "";
        const dayIso = (data && data.date) || "";
        if (when) {
          try {
            const d = new Date(when);
            metaEl.textContent = "Digest updated " + d.toLocaleString(undefined, { dateStyle: "medium", timeStyle: "short" });
          } catch (e) {
            metaEl.textContent = "Digest updated";
          }
        } else {
          metaEl.textContent = "No digest file yet";
        }
        if (dayIso) {
          try {
            const d = new Date(dayIso + "T12:00:00");
            var longDay = d.toLocaleDateString(undefined, { weekday: "long", year: "numeric", month: "long", day: "numeric" });
            dayLabelEl.textContent = tz ? longDay + " · " + tz : longDay;
          } catch (e) {
            dayLabelEl.textContent = dayIso;
          }
        } else {
          dayLabelEl.textContent = "—";
        }
        dayNewerBtn.disabled = !(data && data.newer_date);
        dayOlderBtn.disabled = !(data && data.older_date);
        if (!items.length) {
          tbodyEl.innerHTML = '<tr><td colspan="4" class="text-secondary">No headlines for this day. Try another day or click Refresh to fetch.</td></tr>';
          return;
        }
        tbodyEl.innerHTML = items.map(function (it) {
          const title = (it.title || "(no title)").trim();
          const link = (it.link || "").trim();
          const src = (it.source_feed || "").trim();
          const cats = Array.isArray(it.categories) ? it.categories : [];
          const tickers = Array.isArray(it.tickers) ? it.tickers : [];
          const tickerCos = it.ticker_companies && typeof it.ticker_companies === "object" ? it.ticker_companies : {};
          const headline = link
            ? '<a class="link-success text-decoration-none news-digest-headline-link" href="' + escapeHtml(link) + '" target="_blank" rel="noopener noreferrer" data-sensitive="text">' + escapeHtml(title) + "</a>"
            : '<span data-sensitive="text">' + escapeHtml(title) + "</span>";
          const outlet = src ? '<span class="text-secondary">' + escapeHtml(src) + "</span>" : '<span class="text-secondary">—</span>';
          const typeCell = formatTypeLabels(cats);
          const symBadges = tickers.map(function (s) {
            const co = tickerCos[s];
            const t = co ? escapeHtml(co) : "";
            return '<span class="badge rounded-pill bg-dark border border-secondary text-warning font-monospace" title="' + t + '">' + escapeHtml(s) + "</span>";
          }).join(" ");
          const tickersCell = tickers.length ? symBadges : '<span class="text-secondary">—</span>';
          return (
            "<tr>" +
            '<td class="news-digest-col-headline">' + headline + "</td>" +
            '<td class="news-digest-col-outlet">' + outlet + "</td>" +
            '<td class="news-digest-col-type">' + escapeHtml(typeCell) + "</td>" +
            '<td class="news-digest-col-tickers">' + tickersCell + "</td>" +
            "</tr>"
          );
        }).join("");
      }

      function loadDigest(forDate) {
        metaEl.textContent = "Loading…";
        dayLabelEl.textContent = "—";
        dayNewerBtn.disabled = true;
        dayOlderBtn.disabled = true;
        tbodyEl.innerHTML = '<tr><td colspan="4" class="text-secondary">Loading…</td></tr>';
        var q = "/api/news_articles";
        if (forDate) {
          q += "?date=" + encodeURIComponent(forDate);
        }
        fetch(q)
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (data.error) {
              tbodyEl.innerHTML = '<tr><td colspan="4" class="text-warning">' + escapeHtml(String(data.error)) + "</td></tr>";
              metaEl.textContent = "Error";
              if (typeof reportClientError === "function") {
                reportClientError("news_articles", data.error);
              }
              return;
            }
            renderDigest(data);
          })
          .catch(function (err) {
            tbodyEl.innerHTML = '<tr><td colspan="4" class="text-warning">Could not load news.</td></tr>';
            metaEl.textContent = "Error";
            if (typeof reportClientError === "function") {
              reportClientError("news_articles", err && err.message ? err.message : "fetch failed");
            }
          });
      }

      dayNewerBtn.addEventListener("click", function () {
        if (lastDayPayload && lastDayPayload.newer_date) {
          loadDigest(lastDayPayload.newer_date);
        }
      });
      dayOlderBtn.addEventListener("click", function () {
        if (lastDayPayload && lastDayPayload.older_date) {
          loadDigest(lastDayPayload.older_date);
        }
      });

      refreshBtn.addEventListener("click", function () {
        refreshBtn.disabled = true;
        metaEl.textContent = "Refreshing…";
        tbodyEl.innerHTML = '<tr><td colspan="4" class="text-secondary">Refreshing…</td></tr>';
        var resumeDate = lastDayPayload && lastDayPayload.date ? lastDayPayload.date : null;
        fetch("/api/news_digest/refresh", { method: "POST" })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (data.error) {
              tbodyEl.innerHTML = '<tr><td colspan="4" class="text-warning">' + escapeHtml(String(data.error)) + "</td></tr>";
              metaEl.textContent = "Error";
              if (typeof reportClientError === "function") {
                reportClientError("news_digest_refresh", data.error);
              }
              return;
            }
            loadDigest(resumeDate);
          })
          .catch(function (err) {
            tbodyEl.innerHTML = '<tr><td colspan="4" class="text-warning">Refresh failed.</td></tr>';
            metaEl.textContent = "Error";
            if (typeof reportClientError === "function") {
              reportClientError("news_digest_refresh", err && err.message ? err.message : "fetch failed");
            }
          })
          .finally(function () {
            refreshBtn.disabled = false;
          });
      });

      loadDigest(null);
    })();
    </script>
    <script src="{{ url_for('static', filename='js/privacy-mode.js') }}"></script>
  </body>
</html>
